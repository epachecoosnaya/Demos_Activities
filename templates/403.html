<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso denegado</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; margin:0; min-height:100vh; background:#f5f6f8; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:16px; padding:48px 40px; text-align:center; max-width:420px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,0.07); border:1px solid #e2e5e9; }
    .icon-wrap { width:72px; height:72px; border-radius:50%; background:#fce8e6; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:32px; color:#c5221f; }
    h1 { font-size:22px; font-weight:700; color:#1a1a2e; margin:0 0 8px; }
    p  { font-size:14px; color:#6c757d; margin:0 0 28px; line-height:1.6; }
    .btn { display:inline-flex; align-items:center; gap:7px; padding:10px 22px; background:#714B67; color:#fff; border-radius:8px; text-decoration:none; font-size:14px; font-weight:500; transition:background .15s; }
    .btn:hover { background:#875A7B; color:#fff; }
    .code { font-size:11px; color:#adb5bd; margin-top:20px; font-family:monospace; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap"><i class="bi bi-shield-x"></i></div>
    <h1>Acceso denegado</h1>
    <p>No tienes permiso para ver esta página.<br>Contacta al administrador si crees que esto es un error.</p>
    <a href="javascript:history.back()" class="btn"><i class="bi bi-arrow-left"></i> Regresar</a>
    <div class="code">Error 403 — Forbidden</div>
  </div>
</body>
</html>
